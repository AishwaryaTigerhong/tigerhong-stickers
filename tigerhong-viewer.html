<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TigerHong — Product Info</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Calibri,'Trebuchet MS',sans-serif;background:#f0e8df;min-height:100vh;padding:20px 16px 48px;}
.card{background:#fff;border-radius:12px;overflow:hidden;max-width:520px;margin:0 auto;box-shadow:0 6px 32px rgba(139,94,60,0.18);}
.head{background:#8B5E3C;padding:20px 24px;display:flex;align-items:center;gap:14px;}
.head-logo{height:46px;width:auto;max-width:130px;object-fit:contain;border-radius:4px;flex-shrink:0;}
.head-logo-ph{width:46px;height:46px;background:rgba(255,255,255,0.18);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,0.5);flex-shrink:0;text-align:center;line-height:1.3;}
.co-name{font-size:26px;font-weight:700;color:#fff;letter-spacing:2px;line-height:1.1;}
.co-sub{font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.body{padding:24px 24px 18px;}
.prod-name{font-size:23px;font-weight:700;color:#111;line-height:1.2;}
.prod-cat{font-size:11px;font-weight:700;color:#8B5E3C;letter-spacing:1.5px;text-transform:uppercase;margin-top:5px;margin-bottom:18px;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:1.5px;color:#6b4828;text-transform:uppercase;margin-bottom:11px;}
.specs{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;}
.spec{display:flex;flex-direction:column;gap:3px;}
.spec-k{font-size:10px;color:#aaa;letter-spacing:0.3px;}
.spec-v{font-size:14px;font-weight:700;color:#111;}
.divider{height:1px;background:#ecddd0;margin:18px 0;}
.desc-text{font-size:14px;color:#333;line-height:1.75;}
.foot{background:#faf7f4;border-top:1px solid #ecddd0;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.foot-left{display:flex;flex-direction:column;gap:2px;}
.foot-url{font-size:12px;font-weight:700;color:#8B5E3C;}
.foot-tel{font-size:11px;color:#555;}
.foot-ori{font-size:9px;color:#aaa;letter-spacing:1px;text-transform:uppercase;text-align:right;}
.badge{display:inline-block;background:#f5ede5;color:#8B5E3C;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:3px;margin-bottom:14px;}
.loading{max-width:520px;margin:80px auto;text-align:center;color:#8B5E3C;font-size:16px;padding:20px;}
.error{max-width:520px;margin:60px auto;text-align:center;padding:36px;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(139,94,60,0.12);}
.error h2{font-size:22px;color:#8B5E3C;margin-bottom:10px;}
.error p{font-size:14px;color:#777;line-height:1.6;}
@media(max-width:440px){
  .specs{grid-template-columns:1fr;}
  .co-name{font-size:22px;}
  .head{padding:16px 18px;}
  .body{padding:18px 18px 14px;}
  .foot{padding:12px 18px;}
}
</style>
</head>
<body>
<div id="root"><div class="loading">Loading product information…</div></div>
<script>
/* LZW decompress — accepts array of code integers */
function lzwDecode(arr){
  var d={},l=256,res='',w,e,i;
  for(i=0;i<256;i++) d[i]=String.fromCharCode(i);
  w=d[arr[0]]; res=w;
  for(i=1;i<arr.length;i++){
    var k=arr[i];
    e=(d[k]!==undefined)?d[k]:(w+w[0]);
    res+=e; d[l++]=w+e[0]; w=e;
  }
  return res;
}

/* Unpack base64 binary back into 2-byte code array */
function unpack2(b64){
  var bin=atob(b64), arr=[], i;
  for(i=0;i+1<bin.length;i+=2)
    arr.push((bin.charCodeAt(i)<<8)|bin.charCodeAt(i+1));
  return arr;
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function sp(k,v){
  if(!v) return '';
  return '<div class="spec"><div class="spec-k">'+k+'</div><div class="spec-v">'+esc(v)+'</div></div>';
}

function section(title, pairs){
  var rows = pairs.map(function(p){ return sp(p[0],p[1]); }).filter(Boolean).join('');
  if(!rows) return '';
  return '<div class="divider"></div><div class="sec-title">'+title+'</div><div class="specs">'+rows+'</div>';
}

function render(d){
  // Logo is not in QR data — show styled company initial badge instead
  var initial = (d.co||'T').charAt(0).toUpperCase();
  var logoTag = '<div class="head-logo-ph">'+initial+'</div>';

  document.title = (d.pn||'Product Info') + ' — ' + (d.co||'TigerHong');

  var idSection   = section('Identification', [
    ['Model', d.mo], ['Asset / Tag ID', d.ai]
  ]);
  var techSection = section('Technical specifications', [
    ['Voltage / Power', d.vo],
    ['Operating temp.', d.te],
    ['Warranty', d.wa]
  ]);
  var svcSection  = section('Installation & service', [
    ['Installation date', d.id],
    ['Next service due',  d.sv],
    ['Installed by',      d.tc],
    ['Location',          d.lo]
  ]);
  var descSection = d.de
    ? '<div class="divider"></div><div class="sec-title">Description</div><div class="desc-text">'+esc(d.de)+'</div>'
    : '';

  document.getElementById('root').innerHTML =
    '<div class="card">' +
      '<div class="head">'+logoTag+
        '<div>'+
          '<div class="co-name">'+esc(d.co||'TIGERHONG')+'</div>'+
          '<div class="co-sub">Product Information</div>'+
        '</div>'+
      '</div>'+
      '<div class="body">'+
        '<div class="prod-name">'+esc(d.pn||'—')+'</div>'+
        (d.ca ? '<div class="prod-cat">'+esc(d.ca)+'</div>' : '') +
        idSection + techSection + svcSection + descSection +
      '</div>'+
      '<div class="foot">'+
        '<div class="foot-left">'+
          (d.we ? '<div class="foot-url">'+esc(d.we)+'</div>' : '')+
          (d.ph ? '<div class="foot-tel">'+esc(d.ph)+'</div>' : '')+
        '</div>'+
        (d.or ? '<div class="foot-ori">Made in '+esc(d.or)+'</div>' : '')+
      '</div>'+
    '</div>';
}

(function(){
  var hash = window.location.hash.slice(1);
  var root = document.getElementById('root');

  if(!hash){
    root.innerHTML = '<div class="error"><h2>No product data</h2><p>This page opens automatically when you scan a TigerHong QR sticker.</p></div>';
    return;
  }

  try{
    var d;
    if(hash.slice(0,5) === 'lzw2:'){
      // New format: 2-byte LZW + base64
      var arr  = unpack2(hash.slice(5));
      var json = lzwDecode(arr);
      d = JSON.parse(json);
    } else if(hash.slice(0,4) === 'lzw:'){
      // Legacy format
      var raw = atob(hash.slice(4));
      var arr2 = [];
      for(var i=0;i<raw.length;i++) arr2.push(raw.charCodeAt(i));
      d = JSON.parse(lzwDecode(arr2));
    } else {
      d = JSON.parse(decodeURIComponent(hash));
    }
    render(d);
  } catch(e){
    root.innerHTML = '<div class="error"><h2>Could not read product data</h2><p>Please re-generate the QR sticker and try again.</p></div>';
  }
})();
</script>
</body>
</html>
